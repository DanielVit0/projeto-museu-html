<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museu Nacional</title>

    <link rel="stylesheet" href="css/style.css">

    <!--Normalize CSS-->
    <link rel="stylesheet" href="css/normalize.css">
</head>
<body>
    <div class="container"> <!--Container-->
        <header class="header"><!--header-->
            <div class="logo">
                <h1>
                    <a href="">MUSEU NACIONAL</a> 
                </h1>
            </div>
            <nav class="nav">
                <ul class="nav__list">
                    <li class="nav__item"><a href="#">Home</a></li>
                    <li class="nav__item"><a href="#">Exposições</a></li>
                    <li class="nav__item"><a href="#">Pesquisa</a></li>
                    <li class="nav__item"><a href="#">Acervos</a></li>
                    <li class="nav__item"><a href="#">Vídeos</a></li>
                    <li class="nav__item"><a href="#">Fotos</a></li>
                    <li class="nav__item"><a href="#">Contato</a></li>
                </ul>
             </nav><!--//nav-->
        </header><!--//header-->
        <main class="main">
            <section class="hero">
                <img src="img/museu.png" alt="museu nacional">
            </section>
            <section class="content">
                <article class="video">

                </article>
            </section>

            <aside class="aside">
                <section class="testimonials">
                    <img src="img/depoimento.png" alt="">
                </section>

                <section class="visit">
                    <h4>Faça uma visita</h4>
                    <form action="">
                        <fieldset>
                            <legend>Selecione uma data</legend>
                                <label for="data">Data:</label>
                                <input class="campo" type="text" id="data" placeholder="dd/mm/aaaa">
                                <label for="qtd">Qtd pessoas:</label>
                                <input class="campo" style="width: 30px;" type="text" id="qtd" value="">
                        </fieldset>
                        <input class="botao" type="submit" value="Verificar disponibilidade">
                    </form>
                </section>
                <section class="gallery">
                    <h4>Galeria de fotos</h4>

                    <a href="">
                        <img src="img/imagem1.jpg" alt="" height="93px" width="93px">
                    </a>
                    <a href="">
                        <img src="img/imagem2.jpg" alt="" height="93px" width="93px">
                    </a>
                    <a href="">
                        <img src="img/imagem3.jpg" alt="" height="93px" width="93px">
                    </a>
                    <a href="">
                        <img src="img/imagem4.jpg" alt="" height="93px" width="93px">
                    </a>
                </section>
            </aside>

        </main>

        
    </div><!--//Container-->
</body>
</html>
